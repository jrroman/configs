[cursor.style]
blinking = "On"
shape = "Block"

[font]
size = 14.0

[font.offset]
x = 0
y = 1

[font.bold]
family = "DejaVuSansM Nerd Font Mono"
# family = "Source Code Pro"
style = "Bold"

[font.bold_italic]
family = "DejaVuSansM Nerd Font Mono"
# family = "Source Code Pro"
style = "Bold Oblique"

[font.italic]
family = "DejaVuSansM Nerd Font Mono"
#family = "Source Code Pro"
style = "Oblique"

[font.normal]
family = "DejaVuSansM Nerd Font Mono"
# family = "Source Code Pro"
# style = "Regular"

[scrolling]
history = 10000

[selection]
#"save_to_clipbo#ard" = false

[terminal.shell]
program = "/bin/zsh"

[window]
decorations_theme_variant = "None"
opacity = 1.0
resize_increments = false
startup_mode = "Windowed"

[env]
WINIT_X11_SCALE_FACTOR = "1.0"

[general]
live_config_reload = true
working_directory = "None"
# Favorite themes: tomorrow_night, jr_nvim_dark, google, midnight_haze, gotham, gnome_terminal, rose_pine
# import = ["~/.config/alacritty/theme/tomorrow_night.toml"]
# import = ["~/.config/alacritty/themes/midnight_haze.toml"]
# import = ["~/.config/alacritty/themes/google.toml"]
import = ["~/.config/alacritty/themes/jr_nvim_dark.toml"]

[terminal]
